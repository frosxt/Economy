version: 1
enabled: true

type: VIRTUAL

display-name: "Shards"
singular-name: "shard"
plural-name: "shards"

number-format:
  scale: 0
  use-grouping: true
  suffixes-enabled: false
  round-mode: DOWN

rules:
  transferable: true
  withdraw-enabled: true
  leaderboard-enabled: true
  paytoggle-enabled: true
  allow-decimals: false
  default-balance: 0
  min-balance: 0
  max-balance: -1

command:
  base-command: "shards"
  description: "The shards base command"
  aliases:
    - "shard"
  permission-root: "prisoncore.economy.shards"
  sub-commands:
    help: true
    give: true
    take: true
    set: true
    pay: true
    top: true
    recalc: true
    balance: true
    withdraw: true
    paytoggle: true

withdraw-item:
  enabled: true
  material: "PRISMARINE_SHARD"
  enchanted: true
  name: "&b&l[&3&l!&b&l] &b%amount%x Shard(s) &7(Right-Click)"
  lore:
    - " "
    - "&bInformation"
    - "&b→ &7Shards: &f%amount%x"
    - "&b→ &7From: &f%player%"
    - " "
    - "&7&o(( Right-Click to redeem &f&o%amount%x&7&o shard(s)! ))"

menus:
  top-menu:
    enabled: true
    title: "&8&lSHARDS LEADERBOARD"
    rows: 3
    top-slots: [10, 11, 12, 13, 14, 15, 16]
    borders:
      gray:
        material: "GRAY_STAINED_GLASS_PANE"
        name: " "
        lore: []
        slots:
          - "0-26"
      cyan:
        material: "CYAN_STAINED_GLASS_PANE"
        name: " "
        lore: []
        slots:
          - "9-17"
    invalid-item:
      material: "PLAYER_HEAD"
      skull: "MHF_Question"
      name: "&4&l[&c&l!&4&l] &c???"
      lore: []
    valid-item:
      material: "PLAYER_HEAD"
      skull: "%player%"
      name: "&b&l[&3&l!&b&l] &b%player% &7(#%rank%)"
      lore:
        - " "
        - "&bInformation"
        - "&b→ &7Rank: &f#%rank%"
        - "&b→ &7Shards: &f%amount%x"
    stats-item:
      enabled: true
      slot: 22
      material: "PLAYER_HEAD"
      skull: "%player%"
      name: "&b&l[&3&l!&b&l] &b%player% &7(#%rank%)"
      lore:
        - " "
        - "&bInformation"
        - "&b→ &7Rank: &f#%rank%"
        - "&b→ &7Shards: &f%amount%x"

