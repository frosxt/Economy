    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &7You have &b%amount%x&7 shards."
    sound:
      enabled: true
      value: "block.note_block.pling"
      volume: 1.0
      pitch: 1.0

  balance-other:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &b%player%&7 has &b%amount%x&7 shards."
    sound:
      enabled: true
      value: "block.note_block.pling"
      volume: 1.0
      pitch: 1.0

  given-sender:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &7You have given &b%player% %amount%x&7 shard(s)."

  given-receiver:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &7You have received &b%amount%x&7 shard(s)."

  invalid-player:
