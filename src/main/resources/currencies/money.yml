version: 1
enabled: true

type: MONEY

display-name: "Coins"
singular-name: "coin"
plural-name: "coins"

number-format:
  scale: 2
  use-grouping: true
  suffixes-enabled: false
  round-mode: DOWN

rules:
  transferable: true
  withdraw-enabled: true
  leaderboard-enabled: true
  paytoggle-enabled: true
  allow-decimals: true
  default-balance: 0
  min-balance: 0
  max-balance: -1

command:
  base-command: "money"
  description: "The money base command"
  aliases:
    - "bal"
    - "balance"
  permission-root: "prisoncore.economy.money"
  sub-commands:
    help: true
    give: true
    take: true
    set: true
    pay: true
    top: true
    recalc: true
    balance: true
    withdraw: true
    paytoggle: true

withdraw-item:
  enabled: true
  material: "PAPER"
  enchanted: true
  name: "&2&l[&a&l$&2&l] &a$%amount% Note &7(Right-Click)"
  lore:
    - " "
    - "&aInformation"
    - "&a→ &7Amount: &f$%amount%"
    - "&a→ &7From: &f%player%"
    - " "
    - "&7&o(( Right-Click to redeem this note! ))"

menus:
  top-menu:
    enabled: true
    title: "&8&lMONEY LEADERBOARD"
    rows: 3
    top-slots: [10, 11, 12, 13, 14, 15, 16]
    borders:
      gray:
        material: "GRAY_STAINED_GLASS_PANE"
        name: " "
        lore: []
        slots:
          - "0-26"
      green:
        material: "GREEN_STAINED_GLASS_PANE"
        name: " "
        lore: []
        slots:
          - "9-17"
    invalid-item:
      material: "PLAYER_HEAD"
      skull: "MHF_Question"
      name: "&4&l[&c&l!&4&l] &c???"
      lore: []
    valid-item:
      material: "PLAYER_HEAD"
      skull: "%player%"
      name: "&2&l[&a&l$&2&l] &a%player% &7(#%rank%)"
      lore:
        - " "
        - "&aInformation"
        - "&a→ &7Rank: &f#%rank%"
        - "&a→ &7Balance: &f$%amount%"
    stats-item:
      enabled: true
      slot: 22
      material: "PLAYER_HEAD"
      skull: "%player%"
      name: "&2&l[&a&l$&2&l] &a%player% &7(#%rank%)"
      lore:
        - " "
        - "&aInformation"
        - "&a→ &7Rank: &f#%rank%"
        - "&a→ &7Balance: &f$%amount%"

messages:
  balance:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &7Your balance: &a$%amount%"
    sound:
      enabled: true
      value: "block.note_block.pling"
      volume: 1.0
      pitch: 1.0

  balance-other:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &a%player%&7's balance: &a$%amount%"

  given-sender:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &7You gave &a%player% $%amount%&7."

  given-receiver:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &7You received &a$%amount%&7."

  invalid-player:
    chat:
      enabled: true
      value:
