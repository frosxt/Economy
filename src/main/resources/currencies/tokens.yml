version: 1
enabled: true

type: VIRTUAL

display-name: "Tokens"
singular-name: "token"
plural-name: "tokens"

number-format:
  scale: 0
  use-grouping: true
  suffixes-enabled: false
  round-mode: DOWN

rules:
  transferable: true
  withdraw-enabled: true
  leaderboard-enabled: true
  paytoggle-enabled: true
  allow-decimals: false
  default-balance: 0
  min-balance: 0
  max-balance: -1

command:
  base-command: "tokens"
  description: "The tokens base command"
  aliases:
    - "token"
  permission-root: "prisoncore.economy.tokens"
  sub-commands:
    help: true
    give: true
    take: true
    set: true
    pay: true
    top: true
    recalc: true
    balance: true
    withdraw: true
    paytoggle: true

withdraw-item:
  enabled: true
  material: "GOLD_NUGGET"
  enchanted: true
  name: "&6&l[&e&l!&6&l] &e%amount%x Token(s) &7(Right-Click)"
  lore:
    - " "
    - "&eInformation"
    - "&e→ &7Tokens: &f%amount%x"
    - "&e→ &7From: &f%player%"
    - " "
    - "&7&o(( Right-Click to redeem &f&o%amount%x&7&o token(s)! ))"

menus:
  top-menu:
    enabled: true
    title: "&8&lTOKENS LEADERBOARD"
    rows: 3
    top-slots: [10, 11, 12, 13, 14, 15, 16]
    borders:
      gray:
        material: "GRAY_STAINED_GLASS_PANE"
        name: " "
        lore: []
        slots:
          - "0-26"
      orange:
        material: "ORANGE_STAINED_GLASS_PANE"
        name: " "
        lore: []
        slots:
          - "9-17"
    invalid-item:
      material: "PLAYER_HEAD"
      skull: "MHF_Question"
      name: "&4&l[&c&l!&4&l] &c???"
      lore: []
    valid-item:
      material: "PLAYER_HEAD"
      skull: "%player%"
      name: "&6&l[&e&l!&6&l] &e%player% &7(#%rank%)"
      lore:
        - " "
        - "&eInformation"
        - "&e→ &7Rank: &f#%rank%"
        - "&e→ &7Tokens: &f%amount%x"
        - " "
        - "&7&o(( &f&o%player%&7&o has &f&o%amount%x&7&o tokens! ))"
    stats-item:
      enabled: true
      slot: 22
      material: "PLAYER_HEAD"
      skull: "%player%"
      name: "&6&l[&e&l!&6&l] &e%player% &7(#%rank%)"
      lore:
        - " "
        - "&eInformation"
        - "&e→ &7Rank: &f#%rank%"
        - "&e→ &7Tokens: &f%amount%x"
        - " "
        - "&7&o(( You have &f&o%amount%x&7&o tokens! ))"

messages:
  balance:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &7You have &e%amount%x&7 tokens."
    action-bar:
      enabled: false
      value: ""
    title:
      enabled: false
      title: ""
      subtitle: ""
      fade-in: 10
      stay: 40
      fade-out: 10
    sound:
      enabled: true
      value: "block.note_block.pling"
      volume: 1.0
      pitch: 1.0

  balance-other:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &e%player%&7 has &e%amount%x&7 tokens."
    action-bar:
      enabled: false
      value: ""
    title:
      enabled: false
      title: ""
      subtitle: ""
      fade-in: 10
      stay: 40
      fade-out: 10
    sound:
      enabled: true
      value: "block.note_block.pling"
      volume: 1.0
      pitch: 1.0

  given-sender:
    chat:
      enabled: true
      value:
        - "&e&lPrisons &8&l→ &7You have given &e%player% %amount%x&7 token(s)."
    sound:
      enabled: true
      value: "block.note_block.pling"
      volume: 1.0
      pitch: 1.0

  given-receiver:
    chat:
      enabled: true
